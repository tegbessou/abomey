# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/*/Domain/'

    # explicit bindings: Domain interfaces -> Infrastructure implementations
    # required because the Domain is excluded from the auto-discovered services
    App\Account\Domain\User\UserRepository: '@App\Account\Infrastructure\Doctrine\Repository\DoctrineUserRepository'
    App\Account\Domain\User\UserIdGenerator: '@App\Account\Infrastructure\Uid\SymfonyUserIdGenerator'
    App\Tarot\Domain\Player\PlayerRepository: '@App\Tarot\Infrastructure\Doctrine\Repository\DoctrinePlayerRepository'
    App\Tarot\Domain\Player\PlayerIdGenerator: '@App\Tarot\Infrastructure\Uid\SymfonyPlayerIdGenerator'
    App\Tarot\Domain\Game\GameRepository: '@App\Tarot\Infrastructure\Doctrine\Repository\DoctrineGameRepository'
    App\Tarot\Domain\Game\GameIdGenerator: '@App\Tarot\Infrastructure\Uid\SymfonyGameIdGenerator'

    # explicit bindings: Application ports -> Infrastructure implementations
    App\Account\Application\Auth\SignInUrlProvider: '@App\Account\Infrastructure\Logto\LogtoSignInUrlProvider'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
