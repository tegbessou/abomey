doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        types:
            player_id: App\Tarot\Infrastructure\Doctrine\Type\PlayerIdType
            game_id: App\Tarot\Infrastructure\Doctrine\Type\GameIdType
            poignee_list: App\Tarot\Infrastructure\Doctrine\Type\PoigneeListType
            misere_list: App\Tarot\Infrastructure\Doctrine\Type\MisereListType
            ranking: App\Tarot\Infrastructure\Doctrine\Type\RankingType
            user_id: App\Account\Infrastructure\Doctrine\Type\UserIdType
            email: App\Account\Infrastructure\Doctrine\Type\EmailType

    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src'
                prefix: 'App'
                alias: App

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
