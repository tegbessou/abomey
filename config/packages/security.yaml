security:
    providers:
        app_user_provider:
            id: App\Account\Infrastructure\Security\SecurityUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Account\Infrastructure\Security\LogtoAuthenticator
            entry_point: App\Account\Infrastructure\Security\LogtoAuthenticator
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/up$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/callback$, roles: PUBLIC_ACCESS }
        - { path: ^/legal/, roles: PUBLIC_ACCESS }
        - { path: ^/welcome$, roles: ROLE_USER }
        - { path: ^/logout$, roles: ROLE_USER }
        - { path: ^/, roles: PRIVACY_CONSENT_GIVEN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
        firewalls:
            main:
                custom_authenticators:
                    - App\Account\Infrastructure\Security\LogtoAuthenticator
                    - App\Tests\Panther\Security\TestAuthenticator
